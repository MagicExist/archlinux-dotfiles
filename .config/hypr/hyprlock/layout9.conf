# Layout 9
# By: Mahaveer Gurjar https://github.com/mahaveergurjar/Hyprlock-Dots
# Adapted for HyDE by johhan

$resolve.font=SF Pro Display|https://font.download/dl/font/sf-pro-display.zip

# BACKGROUND
background {
    monitor =
    path = $BACKGROUND_PATH
    blur_passes = 0
    contrast = 0.8916
    brightness = 0.8916
    vibrancy = 0.8916
    vibrancy_darkness = 0.0
}

# GENERAL
general {
    no_fade_in = false
    grace = 0
    disable_loading_bar = false
}

# Profile Photo
image {
    monitor =
    path = $PROFILE_IMAGE
    border_size = 2
    border_color = rgba(34, 84, 150, 0.71)
    size = 150
    rounding = -1
    rotate = 0
    reload_time = -1
    reload_cmd =
    position = 0, 220
    halign = center
    valign = center
}

# NAME
label {
    monitor =
    text = cmd[update:3600000] echo "${USER^}"
    color = rgba(216, 222, 233, 0.80)
    font_size = 20
    font_family = SF Pro Display Bold
    position = 0, 110
    halign = center
    valign = center
}

# Time
label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"%I:%M")</span>"
    color = rgba(216, 222, 233, 0.80)
    font_size = 60
    font_family = SF Pro Display Bold
    position = 0, 30
    halign = center
    valign = center
}

# Day-Month-Date
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %B %d")"
    color = rgba(216, 222, 233, 0.80)
    font_size = 19
    font_family = SF Pro Display Bold
    position = 0, -40
    halign = center
    valign = center
}

# Main Box
shape {
    monitor =
    size = 500, 500
    color = rgba(53, 37, 47, 0.62)
    rounding = 30
    border_size = 0
    rotate = 0
    xray = false
    position = 0, -20
    halign = center
    valign = center
}

# User Box
shape {
    monitor =
    size = 320, 55
    color = rgba(255, 255, 255, 0.1)
    rounding = -1
    border_size = 0
    rotate = 0
    xray = false
    position = 0, -140
    halign = center
    valign = center
}

# User Label
label {
    monitor =
    text = cmd[update:3600000] echo "${USER^}"
    color = rgba(216, 222, 233, 0.80)
    font_size = 16
    font_family = SF Pro Display Bold
    position = 0, -140
    halign = center
    valign = center
}

# Input Field
input-field {
    monitor =
    size = 320, 55
    outline_thickness = 0
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(255, 255, 255, 0)
    inner_color = rgba(255, 255, 255, 0.1)
    font_color = rgb(200, 200, 200)
    font_family = SF Pro Display
    check_color = rgba(0, 255, 0, 0.6)
    fail_color = rgba(255, 0, 0, 0.6)
    fail_text = <i>$FAIL ($ATTEMPTS)</i>
    fade_on_empty = false
    placeholder_text = <i><span foreground="##ffffff99">  Enter Pass</span></i>
    hide_input = false
    rounding = -1
    position = 0, -218
    halign = center
    valign = center
}

# Equalizer arriba (barras crecen hacia arriba)
label {
    monitor =
    text = cmd[update:1] ~/.config/hypr/scripts/eq.sh
    color = rgba(216, 222, 233, 0.80)
    font_size = 28
    font_family = JetBrainsMono Nerd Font
    position = 0, 140
    halign = center
    valign = bottom
}

# Now Playing (en el medio)
label {
    monitor =
    text = cmd[update:5] ~/.config/hypr/scripts/nowplaying.sh
    color = rgba(216, 222, 233, 0.80)
    font_size = 14
    font_family = SF Pro Display
    position = 0, 118
    halign = center
    valign = bottom
}

# Equalizer abajo (barras crecen hacia abajo)
label {
    monitor =
    text = cmd[update:1] ~/.config/hypr/scripts/eq_inverted.sh
    color = rgba(216, 222, 233, 0.80)
    font_size = 28
    font_family = JetBrainsMono Nerd Font
    rotation = 180
    position = 0, 70
    halign = center
    valign = bottom
}
